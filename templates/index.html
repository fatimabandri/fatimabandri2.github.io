{% extends 'base.html' %}
{% block content %}

<style>
    body {
        background-color: #22223b;
    }

    .title {
        text-align: center;
        color: #c9ada7;
        font-weight: 700;
        margin-bottom: 50px;
        text-shadow: 0 0 10px #c9ada7,
            0 0 20px #c9ada7,
            0 0 40px #9a8c98;
    }

    .neon-card {
        background-color: #4a4e69;
        border-radius: 20px;
        padding: 30px;
        color: white;
        transition: 0.4s;
        border: 2px solid #9a8c98;
        box-shadow: 0 0 10px #9a8c98,
            0 0 20px #9a8c98;
    }

    .neon-card:hover {
        transform: scale(1.05);
        box-shadow: 0 0 20px #c9ada7,
            0 0 40px #c9ada7,
            0 0 60px #ffffff;
        border-color: #c9ada7;
    }

    .name {
        font-size: 22px;
        font-weight: bold;
        text-shadow: 0 0 10px #ffffff;
    }

    .label {
        color: #c9ada7;
        font-weight: 600;
    }

    .no-data {
        text-align: center;
        color: #9a8c98;
        text-shadow: 0 0 10px #9a8c98;
    }
</style>

<h2 class="title">Home Data</h2>

<div class="row">
    {% for i in data %}
    <div class="col-md-4 mb-4">
        <div class="neon-card text-center">
            <div class="name">{{ i.name }}</div>
            <p><span class="label">Age:</span> {{ i.age }}</p>
            <p><span class="label">Email:</span> {{ i.email }}</p>
        </div>
    </div>
    {% empty %}
    <h3 class="no-data">No Data Found</h3>
    {% endfor %}
</div>

{% endblock %}
