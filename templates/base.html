<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>MyShop</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #22223b;
            font-family: 'Segoe UI', sans-serif;
            color: white;
        }

        /* ================= NAVBAR ================= */

        .neon-navbar {
            background-color: #22223b;
            padding: 15px 0;
            box-shadow: 0 0 15px #9a8c98,
                0 0 30px #9a8c98;
        }

        .neon-logo {
            color: #c9ada7 !important;
            font-weight: bold;
            font-size: 26px;
            text-shadow: 0 0 10px #c9ada7,
                0 0 20px #c9ada7,
                0 0 40px #ffffff;
        }

        .navbar-nav .nav-link {
            color: white !important;
            margin-left: 25px;
            font-weight: 500;
            position: relative;
            transition: 0.4s;
        }

        /* Neon underline animation */
        .navbar-nav .nav-link::after {
            content: "";
            position: absolute;
            width: 0%;
            height: 2px;
            bottom: 0;
            left: 0;
            background: #c9ada7;
            box-shadow: 0 0 10px #c9ada7;
            transition: 0.4s;
        }

        .navbar-nav .nav-link:hover {
            color: #c9ada7 !important;
            text-shadow: 0 0 10px #c9ada7,
                0 0 20px #c9ada7;
        }

        .navbar-nav .nav-link:hover::after {
            width: 100%;
        }

        /* ================= CONTENT BOX ================= */

        .main-container {
            margin-top: 50px;
            padding: 40px;
            background: #4a4e69;
            border-radius: 20px;
            box-shadow: 0 0 20px #9a8c98,
                0 0 40px #9a8c98;
        }

        /* Footer */
        .footer {
            margin-top: 60px;
            padding: 20px;
            text-align: center;
            background: #22223b;
            color: #9a8c98;
            box-shadow: 0 -5px 20px #9a8c98;
        }
    </style>
</head>

<body>

    <!-- ================= NAVBAR ================= -->

    <nav class="navbar navbar-expand-lg neon-navbar">
        <div class="container">

            <a class="navbar-brand neon-logo" href="#">Profile Hub</a>

            <button class="navbar-toggler bg-light" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav">

                    <li class="nav-item">
                        <a class="nav-link" href="/">Home</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="#">About</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="#">Contact</a>
                    </li>

                </ul>
            </div>

        </div>
    </nav>

    <!-- ================= MAIN CONTENT ================= -->

    <div class="container">
        <div class="main-container">
            {% block content %}
            {% endblock %}
        </div>
    </div>

    <!-- ================= FOOTER ================= -->

    <div class="footer">
        © 2026 MyShop | Designed with 💜 Neon Theme
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
